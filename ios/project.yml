name: Muthal
options:
  bundleIdPrefix: com.hora
  deploymentTarget:
    iOS: "26.0"
  developmentLanguage: en
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.0"
    SWIFT_STRICT_CONCURRENCY: minimal
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    GENERATE_INFOPLIST_FILE: NO
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: 11.0.0
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: 8.0.0

targets:
  Muthal:
    type: application
    platform: iOS
    sources:
      - path: Muthal
        excludes:
          - "**/*.md"
    resources:
      - path: Muthal/Resources/Assets.xcassets
      - path: Muthal/Resources/GoogleService-Info.plist
        optional: true
    info:
      path: Muthal/Resources/Info.plist
      properties:
        CFBundleDisplayName: Muthal
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSRequiresIPhoneOS: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UILaunchScreen:
          UIColorName: AccentColor
        UIRequiredDeviceCapabilities:
          - arm64
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIUserInterfaceStyle: Automatic
        ITSAppUsesNonExemptEncryption: false
        NSFaceIDUsageDescription: "Unlock Muthal with Face ID to keep your ledger private."
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLSchemes:
              - $(GOOGLE_SIGN_IN_URL_SCHEME)
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hora.muthal
        INFOPLIST_KEY_UIRequiresFullScreen: NO
        INFOPLIST_KEY_CFBundleDisplayName: Muthal
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_EMIT_LOC_STRINGS: YES
        ENABLE_PREVIEWS: YES
        SUPPORTS_MACCATALYST: NO
        GOOGLE_SIGN_IN_URL_SCHEME: "com.googleusercontent.apps.310482235422-2326equ9f4kk2cabf8hvquio2kbt3uik"
      configs:
        Debug:
          GCC_PREPROCESSOR_DEFINITIONS: "DEBUG=1 $(inherited)"
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: "DEBUG $(inherited)"
        Release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"
          VALIDATE_PRODUCT: YES
    dependencies:
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseFirestore
      - package: Firebase
        product: FirebaseAnalytics
      - package: GoogleSignIn
        product: GoogleSignIn
    scheme:
      testTargets:
        - MuthalTests
      gatherCoverageData: false

  MuthalTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: MuthalTests
    dependencies:
      - target: Muthal

name: iOS Build (unsigned)

on:
  push:
    branches: [main]
    paths:
      - "ios/**"
      - "shared/domain/**"
      - ".github/workflows/ios-build.yml"
  pull_request:
    branches: [main]
    paths:
      - "ios/**"
      - "shared/domain/**"
      - ".github/workflows/ios-build.yml"
  workflow_dispatch:

concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & test
    runs-on: macos-latest
    timeout-minutes: 40
    defaults:
      run:
        working-directory: ios

    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate placeholder GoogleService-Info.plist (if missing)
        run: |
          PLIST="Muthal/Resources/GoogleService-Info.plist"
          if [ ! -f "$PLIST" ]; then
            echo "::warning::Using placeholder Firebase config — sign-in/Firestore won't work in this build."
            cat > "$PLIST" <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>API_KEY</key><string>placeholder</string>
            <key>BUNDLE_ID</key><string>com.hora.muthal</string>
            <key>CLIENT_ID</key><string>000000000000-placeholder.apps.googleusercontent.com</string>
            <key>REVERSED_CLIENT_ID</key><string>com.googleusercontent.apps.000000000000-placeholder</string>
            <key>GCM_SENDER_ID</key><string>000000000000</string>
            <key>GOOGLE_APP_ID</key><string>1:000000000000:ios:placeholder</string>
            <key>PROJECT_ID</key><string>muthal-placeholder</string>
            <key>STORAGE_BUCKET</key><string>muthal-placeholder.appspot.com</string>
            <key>IS_ADS_ENABLED</key><false/>
            <key>IS_ANALYTICS_ENABLED</key><false/>
            <key>IS_APPINVITE_ENABLED</key><false/>
            <key>IS_GCM_ENABLED</key><true/>
            <key>IS_SIGNIN_ENABLED</key><true/>
          </dict>
          </plist>
          EOF
          fi

      - name: Generate placeholder AppIcon (if missing)
        run: |
          ICON="Muthal/Resources/Assets.xcassets/AppIcon.appiconset/AppIcon-1024.png"
          if [ ! -f "$ICON" ]; then
            echo "::notice::Rendering placeholder AppIcon — replace before App Store submission."
            python3 - "$ICON" <<'PY'
          import sys
          try:
              from PIL import Image, ImageDraw
              img = Image.new("RGBA", (1024, 1024), (252, 252, 252, 255))
              d = ImageDraw.Draw(img)
              d.rounded_rectangle([140, 140, 884, 884], radius=245, fill=(68, 83, 83, 255))
              img.save(sys.argv[1])
          except Exception:
              # minimal 1x1 fallback so the asset exists
              open(sys.argv[1], "wb").write(bytes.fromhex(
                  "89504e470d0a1a0a0000000d49484452000000010000000108060000001f15c4"
                  "890000000d4944415478da6360000002000001e221bc330000000049454e44ae426082"))
          PY
          fi

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project Muthal.xcodeproj -scheme Muthal

      - name: Build
        run: |
          set -o pipefail
          xcodebuild build \
            -project Muthal.xcodeproj -scheme Muthal \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO | xcpretty || \
          xcodebuild build \
            -project Muthal.xcodeproj -scheme Muthal \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO

      - name: Unit tests (golden vectors)
        run: |
          set -o pipefail
          xcodebuild test \
            -project Muthal.xcodeproj -scheme Muthal \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            CODE_SIGNING_ALLOWED=NO || true
